<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320, height=480, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e1e" />
  <title>Spotify — Pi</title>
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Login screen when not authenticated -->
    <div id="login-screen" class="screen hidden">
      <div class="login-card">
        <div class="logo" aria-hidden="true">♪</div>
        <h1>Spotify Pi</h1>
        <p>Connect your Spotify account to control playback from this device.</p>
        <a id="login-btn" href="#" class="btn btn-primary">Log in with Spotify</a>
        <p id="login-error" class="error hidden"></p>
      </div>
    </div>

    <!-- Main player screen — compact widget style with progress bar -->
    <div id="player-screen" class="screen hidden">
      <div class="player-inner">
        <div class="now-playing">
          <div class="art-wrap">
            <img id="art" src="" alt="" class="art" />
            <div id="no-art" class="no-art hidden">♪</div>
          </div>
          <div class="meta">
            <h2 id="track-name" class="track-name">—</h2>
            <p id="artist-name" class="artist-name">—</p>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <div class="progress-times">
            <span id="time-current" class="time-current">0:00</span>
            <span id="time-remaining" class="time-remaining">-0:00</span>
          </div>
        </div>
        <div class="controls">
          <button type="button" id="btn-prev" class="ctrl-btn" title="Previous" aria-label="Previous">⏮</button>
          <button type="button" id="btn-play-pause" class="ctrl-btn play-pause" title="Play / Pause" aria-label="Play or Pause">▶</button>
          <button type="button" id="btn-next" class="ctrl-btn" title="Next" aria-label="Next">⏭</button>
        </div>
        <div class="volume-wrap">
          <span class="vol-label">Vol</span>
          <input type="range" id="volume" class="volume" min="0" max="100" value="70" aria-label="Volume" />
        </div>
      </div>
    </div>

    <div id="loading" class="screen loading">
      <div class="spinner"></div>
      <p>Connecting…</p>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
